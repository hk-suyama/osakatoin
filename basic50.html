<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古文単語　語源・意味解説集 | OSAKA TOIN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;700&family=Shippori+Mincho+B1:wght@400;500;600;800&family=Zen+Old+Mincho:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5efe4;
    --paper-dark: #ede3d0;
    --red: #9b2a2a;
    --red-light: #c94040;
    --gold: #a07830;
    --gold-light: #c9a050;
    --line: #c8b89a;
    --muted: #7a6a54;
    --accent-bg: #e8dcc8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--paper-dark);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 31px, var(--line) 31px, var(--line) 32px);
    font-family: 'Noto Serif JP', 'Yu Mincho', serif;
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--paper);
    text-align: center;
    padding: 2.8rem 2rem 2.2rem;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(
        45deg,
        transparent, transparent 18px,
        rgba(255,255,255,.03) 18px, rgba(255,255,255,.03) 19px
      );
  }

  header::after {
    content: '';
    display: block;
    width: 120px; height: 3px;
    background: var(--gold-light);
    margin: .9rem auto 0;
  }

  .header-kana {
    font-family: 'Shippori Mincho B1', serif;
    font-size: .72rem;
    letter-spacing: .5em;
    color: var(--gold-light);
    text-transform: uppercase;
    margin-bottom: .45rem;
  }

  header h1 {
    font-family: 'Zen Old Mincho', serif;
    font-weight: 900;
    font-size: 2.6rem;
    letter-spacing: .22em;
    line-height: 1.2;
    position: relative;
  }

  .header-sub {
    margin-top: .6rem;
    font-size: .78rem;
    letter-spacing: .35em;
    color: #b0a090;
    font-family: 'Shippori Mincho B1', serif;
  }

  /* ── SEARCH / FILTER ── */
  .controls {
    max-width: 860px;
    margin: 1.8rem auto .6rem;
    padding: 0 1.2rem;
    display: flex;
    gap: .7rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1 1 240px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    padding: .55rem 1rem .55rem 2.4rem;
    border: 1.5px solid var(--line);
    border-radius: 2px;
    background: var(--paper);
    font-family: inherit;
    font-size: .88rem;
    color: var(--ink);
    outline: none;
    transition: border-color .2s;
  }

  .search-wrap input:focus { border-color: var(--gold); }

  .search-wrap::before {
    content: '🔍';
    position: absolute; left: .65rem; top: 50%; transform: translateY(-50%);
    font-size: .8rem; pointer-events: none;
  }

  .filter-btns {
    display: flex; gap: .4rem; flex-wrap: wrap;
  }

  .filter-btn {
    padding: .38rem .75rem;
    border: 1.5px solid var(--line);
    border-radius: 2px;
    background: var(--paper);
    font-family: inherit;
    font-size: .78rem;
    color: var(--muted);
    cursor: pointer;
    transition: all .18s;
  }

  .filter-btn.active,
  .filter-btn:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  /* ── COUNT LINE ── */
  .count-line {
    max-width: 860px;
    margin: 0 auto .5rem;
    padding: 0 1.2rem;
    font-size: .75rem;
    color: var(--muted);
    letter-spacing: .05em;
  }

  /* ── MAIN GRID ── */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 1.2rem 3rem;
  }

  /* ── CARD ── */
  .card {
    background: var(--paper);
    border-left: 4px solid var(--gold);
    margin-bottom: 1.1rem;
    padding: 0;
    box-shadow: 2px 2px 6px rgba(0,0,0,.08);
    transition: box-shadow .2s, transform .15s;
    position: relative;
  }

  .card:hover {
    box-shadow: 3px 4px 14px rgba(0,0,0,.14);
    transform: translateY(-1px);
  }

  .card-header {
    display: flex;
    align-items: baseline;
    gap: .7rem;
    padding: .75rem 1.1rem .55rem;
    border-bottom: 1px solid var(--accent-bg);
    cursor: pointer;
    user-select: none;
  }

  .card-num {
    font-family: 'Shippori Mincho B1', serif;
    font-size: .7rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: .05em;
    min-width: 1.8rem;
  }

  .card-word {
    font-family: 'Zen Old Mincho', serif;
    font-size: 1.55rem;
    font-weight: 700;
    letter-spacing: .06em;
    color: var(--ink);
    flex: 0 0 auto;
  }

  .card-info {
    display: flex;
    flex-wrap: wrap;
    gap: .3rem .55rem;
    align-items: center;
  }

  .card-pos {
    font-size: .7rem;
    background: var(--accent-bg);
    color: var(--muted);
    padding: .1rem .45rem;
    border-radius: 2px;
    letter-spacing: .03em;
    font-family: 'Shippori Mincho B1', serif;
  }

  .card-kanji {
    font-size: .78rem;
    color: var(--red);
    letter-spacing: .04em;
    font-family: 'Shippori Mincho B1', serif;
  }

  .card-toggle {
    margin-left: auto;
    font-size: .65rem;
    color: var(--muted);
    transition: transform .2s;
    flex-shrink: 0;
  }

  .card.open .card-toggle { transform: rotate(180deg); }

  .card-body {
    padding: 0 1.1rem;
    max-height: 0;
    overflow: hidden;
    transition: max-height .35s ease, padding .25s;
  }

  .card.open .card-body {
    max-height: 9999px;
    padding: .65rem 1.1rem 1rem;
  }

  .card-body p {
    font-size: .88rem;
    line-height: 2.05;
    color: #2a220e;
    margin-bottom: .55rem;
  }

  .card-body p:last-child { margin-bottom: 0; }

  /* paragraph separator within a card */
  .card-body .para-sep {
    display: block;
    width: 28px; height: 1.5px;
    background: var(--line);
    margin: .55rem 0 .6rem;
  }

  /* ── CATEGORY CHIPS ── */
  .cat-verb    { border-left-color: #5b8c5a; }
  .cat-adj     { border-left-color: #5a6b9c; }
  .cat-adj-dyn { border-left-color: #9c6b5a; }
  .cat-adv     { border-left-color: #7a5a9c; }
  .cat-noun    { border-left-color: #9c8a3a; }

  .cat-verb    .card-pos { background: #e6f0e6; color: #3a6a38; }
  .cat-adj     .card-pos { background: #e6eaf5; color: #3a4a7c; }
  .cat-adj-dyn .card-pos { background: #f5ebe6; color: #7c4a3a; }
  .cat-adv     .card-pos { background: #ede6f5; color: #5a3a7c; }
  .cat-noun    .card-pos { background: #f5f0e0; color: #7c6a1a; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 1.2rem;
    font-size: .72rem;
    color: var(--muted);
    letter-spacing: .12em;
    border-top: 1px solid var(--line);
    margin-top: 1rem;
  }

  /* ── HIDDEN ── */
  .card.hidden { display: none; }

  /* ── OPEN ALL BUTTON ── */
  .open-all-btn {
    padding: .38rem .85rem;
    border: 1.5px solid var(--line);
    border-radius: 2px;
    background: var(--paper);
    font-family: inherit;
    font-size: .78rem;
    color: var(--muted);
    cursor: pointer;
    transition: all .18s;
  }
  .open-all-btn:hover { background: var(--accent-bg); }

  @media (max-width: 600px) {
    header h1 { font-size: 1.9rem; }
    .card-word { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-kana">OSAKA TOIN</div>
  <h1>古文単語　語源・意味解説集</h1>
  <div class="header-sub">Basic 50 words</div>
</header>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="単語・説明文を検索…">
  </div>
  <div class="filter-btns">
    <button class="filter-btn active" data-cat="all">すべて</button>
    <button class="filter-btn" data-cat="verb">動詞</button>
    <button class="filter-btn" data-cat="adj">形容詞</button>
    <button class="filter-btn" data-cat="adj-dyn">形容動詞</button>
    <button class="filter-btn" data-cat="adv">副詞</button>
    <button class="filter-btn" data-cat="noun">名詞</button>
  </div>
  <button class="open-all-btn" id="openAllBtn">すべて開く</button>
</div>

<div class="count-line" id="countLine">50語を表示中</div>

<main id="cardList"></main>

<footer>古文単語　語源・意味解説集　｜　OSAKA TOIN</footer>

<script>
const words = [
  {
    num: 1, word: "おどろく", pos: "動　カ四", kanji: null, cat: "verb",
    paras: [
      "「オド」の部分は「オノ」の変化した形。「オノ」は感動詞「アナ」の母音交替形。現代語で言えば「アナ」が「ああ」、「オノ」が「おお」のようなもの。「オノ」は物事に気づいて驚くときなどに使う。",
      "その「オノ」と通底する「オドロク」は、「おお」と声を出してしまうような出来事や夢によってはっと目が覚める意。そこから、大事なことに「おお」と気づいたり、予期せぬ重大事に直面したりして「おお」とびっくりしたりする意にもなった。"

      "中古における「ノノシル」は、多く大声で騒いだり読経したり、大音量で楽器などを演奏したりすることをいう。また、「言ひののしる」などのように動詞の連用形の下に付いて「大声で～する」「さかんに～する」の意で用いられることも多い。"
    ]
  },
  {
    num: 3, word: "念ず", pos: "動　サ変", kanji: null, cat: "verb",
    paras: [
      "「念」は心にかたくとめ置いた思いを意味する漢語。それにサ変動詞「ス」がついて動詞化した語。対象から心をそらさず、心の中で強く思い続ける意。",
      "心を集中して物事を強く思うことから、こうあってほしいと真剣に思ったり祈ったりする意味のほかに、その他の感情を押さえてじっと我慢する意も生じた。"

  },
  {

      "「オボユ」には、「自然に思われる」「思い出される」などのほか「似ている」の意もあるが、これはあるもの（Ｘ）を見たときに自然と他のもの（Ｙ）が思い浮かぶというところから、「ＸとＹがそっくりだと感じられる」となって生まれたものとされる。",

      "なお、「ユ」は受身で用いられることもあり、それは「思われる」の意に表われている。"
    ]
  },
  {
    num: 5, word: "しのぶ", pos: "動　バ上二・バ四", kanji: "【忍ぶ・偲ぶ】", cat: "verb",
    paras: [
      "本来、「忍ぶ」と「偲ぶ」は全くの別物。",
      "もともと「シノブ（忍ぶ）」は「耐えて隠す」という意のバ行上二段動詞、「シノフ（偲ぶ）」は「ひそかに思い慕う」という意のハ行四段動詞であった。それが、中古に入って「シノブ（忍ぶ）」の「隠す」意と「シノフ（偲ふ）」の「ひそかに」のニュアンスが近似していることから、両者が混同して使われるようになり、次第に上二段と四段の区別も崩れていったものとされる。",

      "「シノブ（忍ぶ）」は副詞「エ」と助動詞「ズ」をともなった「え忍ばず」の形で、「こらえきれない」の意で使われることが多い。",
      "また、「隠す」の意が強く出ているときは、「シノブ（忍ぶ）」は「忍び出づ」「忍び通ふ」のように複合動詞化して「こっそり～する」の意で用いられることが多く、中古ごろの貴族社会では様々な行動が秘密裏になされていたことの一端があらわれている。"
    ]
  },
  {
    num: 6, word: "ながむ", pos: "動　マ下二", kanji: null, cat: "verb",
    paras: [
      "じっと長い時間、同じ場所に目をやる「長目」が動詞化したものかとされる。何らかの関心をもって凝視しているのではなく、焦点が合っていない感じで、実際には別の物事を思い浮かべているニュアンスで用いられることが多く、「物思いに沈む」の意となる。"
    ]
  },
  {
    num: 7, word: "見ゆ", pos: "動　ヤ下二", kanji: null, cat: "verb",

      "動詞「ミル（見る）」と、自然に動作が成立することを表す上代の助動詞「ユ」が結びついたもの。よって、「見る」という動作が自然のなりゆきで成立する「目に入る」が基本。そこから派生して、その人を視界に捉えるところから「人が来る」などの意も生じた。",

    ]
  },
  {
    num: 8, word: "あふ", pos: "動　ハ四", kanji: null, cat: "verb",

      "また、二つのものが互いに近づいて一つになるところから、「出会う」「ぶつかる」「衝突する」の意まで発展した。",
      "なお、「相見る」などで使われる接頭語「アヒ（相）」はもともと「合ひ見る」のように「合ふ」の連用形から生じた複合動詞であったものが、接頭語として用いられるようになっていったものとされる。"
    ]
  },
  {
    num: 9, word: "ゐる", pos: "動　ワ上一", kanji: "【居る】", cat: "verb",

  },
  {

      "ほかの動詞に下接して補助動詞として用いられることが多く、その場合には「動き回る」のニュアンスから「あちこちで～してまわる」「しきりに～する」の意となる。",
      "また、連用形で名詞となった「アリキ（歩き）」が、「あちこち」のニュアンスから、男性が正妻でない女性のもとに行くことを指すこともある。"

  },
  {
    num: 11, word: "あく", pos: "動　カ四", kanji: "【飽く】", cat: "verb",

  },

  },
  {

    paras: [

  {

const catLabels = {
  verb: "動詞", adj: "形容詞", "adj-dyn": "形容動詞", adv: "副詞", noun: "名詞"
};

let currentCat = "all";
let allOpen = false;

function buildCards() {
  const list = document.getElementById("cardList");
  list.innerHTML = "";
  words.forEach(w => {
    const card = document.createElement("div");
    card.className = `card cat-${w.cat}`;
    card.dataset.cat = w.cat;
    card.dataset.idx = w.num;
    card.dataset.text = (w.word + (w.kanji||"") + w.paras.join(" ")).toLowerCase();

    const hdr = document.createElement("div");
    hdr.className = "card-header";
    hdr.innerHTML = `
      <span class="card-num">${String(w.num).padStart(2,"0")}</span>
      <span class="card-word">${w.word}</span>
      <span class="card-info">
        <span class="card-pos">${w.pos}</span>
        ${w.kanji ? `<span class="card-kanji">${w.kanji}</span>` : ""}
      </span>
      <span class="card-toggle">▼</span>
    `;
    hdr.addEventListener("click", () => card.classList.toggle("open"));

    const body = document.createElement("div");
    body.className = "card-body";
    body.innerHTML = w.paras.map((p,i) =>
      `${i>0?'<span class="para-sep"></span>':''}<p>${p}</p>`
    ).join("");

    card.appendChild(hdr);
    card.appendChild(body);
    list.appendChild(card);
  });
  updateCount();
}

function filterCards() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  let shown = 0;
  document.querySelectorAll(".card").forEach(card => {
    const matchCat = currentCat === "all" || card.dataset.cat === currentCat;
    const matchQ = !q || card.dataset.text.includes(q);
    if (matchCat && matchQ) { card.classList.remove("hidden"); shown++; }
    else card.classList.add("hidden");
  });
  document.getElementById("countLine").textContent =
    shown === words.length ? `全${words.length}語を表示中` : `${shown}語を表示中（全${words.length}語中）`;
}

function updateCount() {
  document.getElementById("countLine").textContent = `全${words.length}語を表示中`;
}

document.getElementById("searchInput").addEventListener("input", filterCards);

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentCat = btn.dataset.cat;
    filterCards();
  });
});

document.getElementById("openAllBtn").addEventListener("click", () => {
  allOpen = !allOpen;
  document.querySelectorAll(".card:not(.hidden)").forEach(c => {
    if (allOpen) c.classList.add("open"); else c.classList.remove("open");
  });
  document.getElementById("openAllBtn").textContent = allOpen ? "すべて閉じる" : "すべて開く";
});

buildCards();
</script>
