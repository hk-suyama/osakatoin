<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古典文法徹底反復練習（動詞）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #ddd8cc;
    --border2: #c8c2b4;
    --text: #1a1208;
    --text2: #6b5c48;
    --text3: #9c8e7a;
    --accent: #8b1a1a;
    --accent-bg: #f5e6e6;
    --ok: #1a6b3a;
    --ok-bg: #e6f5ec;
    --ok-border: #a8d8b8;
    --ng: #8b1a1a;
    --ng-bg: #f5e6e6;
    --ng-border: #d8a8a8;
    --info: #1a3a6b;
    --info-bg: #e6eef5;
    --radius: 10px;
    --radius-sm: 6px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1812;
      --surface: #252218;
      --surface2: #2e2a20;
      --border: #3a3628;
      --border2: #4a4638;
      --text: #f0ece0;
      --text2: #a89c88;
      --text3: #7a6e5a;
      --accent: #e08080;
      --accent-bg: #3a1818;
      --ok: #80d8a0;
      --ok-bg: #1a3028;
      --ok-border: #4a8060;
      --ng: #e08080;
      --ng-bg: #3a1818;
      --ng-border: #804040;
      --info: #80a8e0;
      --info-bg: #18283a;
    }
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem 4rem;
  }

  header {
    width: 100%;
    max-width: 560px;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
    margin-bottom: 0.2rem;
  }
  header p {
    font-size: 0.8rem;
    color: var(--text3);
  }

  #app {
    width: 100%;
    max-width: 560px;
  }

  /* プログレス */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
  }
  .progress-bar {
    flex: 1;
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 0.78rem;
    color: var(--text3);
    white-space: nowrap;
    min-width: 3rem;
    text-align: right;
  }

  /* スタッツ */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 1.2rem;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.55rem 0.5rem;
    text-align: center;
  }
  .stat-num {
    font-size: 1.3rem;
    font-weight: 700;
    line-height: 1;
  }
  .stat-num.ok { color: var(--ok); }
  .stat-num.ng { color: var(--ng); }
  .stat-lbl {
    font-size: 0.7rem;
    color: var(--text3);
    margin-top: 3px;
  }

  /* カード */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 1.25rem 1.25rem;
    margin-bottom: 1rem;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .card-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
  }
  .card-question {
    font-size: 1.05rem;
    font-weight: 500;
    line-height: 1.7;
    color: var(--text);
    flex: 1;
  }
  .card-answer {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.9rem 1rem;
    font-size: 0.95rem;
    line-height: 1.8;
    color: var(--text);
    display: none;
  }
  .card-answer.shown {
    display: block;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ボタン */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 0.75rem 1rem;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-bottom: 0.5rem;
  }
  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(0.98); }

  .judge-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    display: none;
  }
  .btn-ok {
    border-color: var(--ok-border);
    color: var(--ok);
    background: var(--ok-bg);
  }
  .btn-ok:hover { filter: brightness(0.95); }
  .btn-ng {
    border-color: var(--ng-border);
    color: var(--ng);
    background: var(--ng-bg);
  }
  .btn-ng:hover { filter: brightness(0.95); }

  /* 結果画面 */
  .result {
    text-align: center;
    padding: 2.5rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .result-score {
    font-size: 3rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 0.4rem;
  }
  .result-label {
    font-size: 0.85rem;
    color: var(--text2);
    margin-bottom: 1.5rem;
  }
  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    max-width: 300px;
    margin: 0 auto 1.8rem;
  }
  .btn-restart {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0.7rem 2rem;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-restart:hover { background: var(--surface2); }
</style>
</head>
<body>

<header>
  <h1>古典文法クイズ（動詞）</h1>
  <p>大阪桐蔭中学校　国語（古典）　授業プリントより</p>
</header>

<div id="app"></div>

<script>
const ALL = [
  {q:"活用形の6つは？（順番通りに）",a:"未然・連用・終止・連体・已然・命令"},
  {q:"未然形の主な下接語は？",a:"「ず」「む」"},
  {q:"連用形の主な下接語は？",a:"「けり」「たり」"},
  {q:"終止形の主な下接語は？",a:"句点（。）"},
  {q:"連体形の主な下接語は？",a:"「とき」「こと」などの体言"},
  {q:"已然形の主な下接語は？",a:"「ど」「ども」"},
  {q:"活用の3タイプは？",a:"母音交替・接辞付加・接辞付加＋母音交替"},
  {q:"母音交替タイプに属する活用の種類は？",a:"四段活用・ラ行変格活用"},
  {q:"接辞付加タイプに属する活用の種類は？",a:"上一段活用・下一段活用"},
  {q:"接辞付加で付加される接辞は？",a:"「る」「れ」「よ」"},
  {q:"接辞付加＋母音交替タイプに属する活用の種類は？",a:"上二段・下二段・カ行変格・サ行変格・ナ行変格"},
  {q:"四段動詞「咲く」の活用表は？",a:"咲かず・咲きけり・咲く。・咲くとき・咲けども・咲け！"},
  {q:"ラ変動詞「あり」の活用表は？",a:"あらず・ありけり・あり。・あるとき・あれども・あれ！"},
  {q:"ラ変に属する動詞は？",a:"あり・居（を）り・侍（はべ）り・いまそがり（4つ）"},
  {q:"上一段動詞「見る」の活用表は？",a:"見ず・見けり・見る。・見るとき・見れども・見よ！"},
  {q:"上一段に属する動詞は？（行順で）",a:"カ：着る／ナ：似る・煮る／ハ：干（ひ）る／マ：見る／ヤ：射る・鋳る／ワ：居（ゐ）る・率（ゐ）る"},
  {q:"下一段動詞「蹴る」の活用表は？",a:"蹴ず・蹴けり・蹴る。・蹴るとき・蹴れども・蹴よ！"},
  {q:"カ変動詞「来」の活用表は？",a:"こず・きけり・く。・くるとき・くれども・こよ！"},
  {q:"サ変動詞「す」の活用表は？",a:"せず・しけり・す。・するとき・すれども・せよ！"},
  {q:"サ変に属する動詞は？",a:"す・おはす（とその複合語）"},
  {q:"ナ変動詞「往ぬ」の活用表は？",a:"往なず・往にけり・往ぬ。・往ぬるとき・往ぬれども・往ね！"},
  {q:"上二段動詞「落つ」の活用表は？",a:"落ちず・落ちけり・落つ。・落つるとき・落つれども・落ちよ！"},
  {q:"下二段動詞「棄つ」の活用表は？",a:"棄てず・棄てけり・棄つ。・棄つるとき・棄つれども・棄てよ！"},
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let deck, idx, correct, wrong;

function init() {
  deck = shuffle(ALL);
  idx = 0; correct = 0; wrong = 0;
  render();
}

function render() {
  const app = document.getElementById('app');
  if (idx >= deck.length) {
    const pct = Math.round(correct / deck.length * 100);
    const msg = pct >= 80 ? 'お疲れ様でした！' : pct >= 60 ? 'もう少しです！' : 'もう一度挑戦！';
    app.innerHTML = `
      <div class="result">
        <div class="result-score">${pct}%</div>
        <div class="result-label">${msg}（${correct} / ${deck.length} 問正解）</div>
        <div class="result-stats">
          <div class="stat"><div class="stat-num ok">${correct}</div><div class="stat-lbl">正解</div></div>
          <div class="stat"><div class="stat-num ng">${wrong}</div><div class="stat-lbl">不正解</div></div>
          <div class="stat"><div class="stat-num">${deck.length}</div><div class="stat-lbl">合計</div></div>
        </div>
        <button class="btn-restart" onclick="init()">
          <i class="ti ti-refresh"></i> もう一度
        </button>
      </div>`;
    return;
  }

  const card = deck[idx];
  const pct = Math.round(idx / deck.length * 100);

  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${idx + 1} / ${deck.length}</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-num ok">${correct}</div><div class="stat-lbl">正解</div></div>
      <div class="stat"><div class="stat-num ng">${wrong}</div><div class="stat-lbl">不正解</div></div>
      <div class="stat"><div class="stat-num">${deck.length - idx}</div><div class="stat-lbl">残り</div></div>
    </div>
    <div class="card">
      <div>
        <div class="card-label">問題</div>
        <div class="card-question">${card.q}</div>
      </div>
      <div class="card-answer" id="ans">${card.a}</div>
    </div>
    <button class="btn" id="show-btn" onclick="reveal()">
      <i class="ti ti-eye"></i> 答えを見る
    </button>
    <div class="judge-row" id="judge">
      <button class="btn btn-ok" onclick="judge(true)"><i class="ti ti-check"></i> 正解</button>
      <button class="btn btn-ng" onclick="judge(false)"><i class="ti ti-x"></i> 不正解</button>
    </div>`;
}

function reveal() {
  document.getElementById('ans').classList.add('shown');
  document.getElementById('show-btn').style.display = 'none';
  document.getElementById('judge').style.display = 'grid';
}

function judge(ok) {
  if (ok) correct++; else wrong++;
  idx++;
  render();
}

init();
</script>
</body>
</html>
