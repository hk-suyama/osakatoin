<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2026 World Cup</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pitch-deep:#07271e;--chalk:#f2f5ef;--lime:#c8f04a;--clay:#e8623d;
  --sky:#4ea3d9;--gold:#f2c14e;--line:rgba(242,245,239,.14);
  --c-so:#c8f04a;--c-os:#4ea3d9;--c-su:#e8623d;--c-na:#f2c14e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--pitch-deep);
  background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.012) 0 60px,transparent 60px 120px);
  color:var(--chalk);font-family:"Zen Kaku Gothic New",system-ui,sans-serif;
  line-height:1.7;padding:0 0 80px;
}
.wrap{max-width:1080px;margin:0 auto;padding:0 24px}

header{border-bottom:1px solid var(--line);padding:56px 0 44px;margin-bottom:48px;position:relative;overflow:hidden}
header::after{content:"";position:absolute;right:-80px;top:-60px;width:320px;height:320px;border:1px solid var(--line);border-radius:50%}
header::before{content:"";position:absolute;right:60px;top:60px;width:180px;height:180px;border:1px solid var(--line);border-radius:50%}
.eyebrow{font-family:"Barlow Condensed",sans-serif;letter-spacing:.28em;text-transform:uppercase;font-size:.78rem;color:var(--lime);margin-bottom:12px}
h1{font-family:"Barlow Condensed",sans-serif;font-size:clamp(2.6rem,7vw,4.6rem);font-weight:700;line-height:1;text-transform:uppercase}
h1 em{font-style:normal;color:var(--lime)}

section{margin-bottom:64px}
h2{font-size:1.05rem;font-weight:700;letter-spacing:.04em;display:flex;align-items:center;gap:14px;margin-bottom:22px}
h2::after{content:"";flex:1;height:1px;background:var(--line)}
.tag{font-family:"Barlow Condensed",sans-serif;font-size:.72rem;letter-spacing:.18em;border:1px solid var(--line);border-radius:99px;padding:2px 11px;color:rgba(242,245,239,.5);font-weight:600}

/* flag */
.flag{width:20px;height:14px;flex:none;border-radius:1.5px;box-shadow:0 0 0 1px rgba(0,0,0,.35) inset;display:block}
.flag.sm{width:15px;height:11px}

/* SIM */
.sim{border:1px solid var(--line);border-radius:4px;padding:26px}
.simrow{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
@media(max-width:820px){.simrow{grid-template-columns:1fr 1fr}}
label{display:block;font-size:.7rem;letter-spacing:.14em;color:rgba(242,245,239,.45);margin-bottom:8px;font-weight:700}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  display:inline-flex;align-items:center;gap:7px;
  border:1px solid var(--line);background:transparent;color:var(--chalk);
  padding:6px 12px;border-radius:99px;cursor:pointer;font-family:inherit;font-size:.82rem;transition:.15s;
}
.chip:hover{border-color:rgba(242,245,239,.4)}
.chip[aria-pressed="true"]{background:var(--lime);color:var(--pitch-deep);border-color:var(--lime);font-weight:700}
.chip:focus-visible{outline:2px solid var(--sky);outline-offset:2px}
.chip:disabled{cursor:default}
.chip.locked[aria-pressed="true"]{background:var(--gold);border-color:var(--gold);color:var(--pitch-deep)}
.chip.locked[aria-pressed="false"]{opacity:.25;text-decoration:line-through}
.lock{font-family:"Barlow Condensed",sans-serif;font-size:.6rem;letter-spacing:.14em;color:var(--gold);margin-left:6px;font-weight:700;vertical-align:1px}
.divider{height:1px;background:var(--line);margin:22px 0}
.results{display:flex;flex-direction:column;gap:9px}
.res{display:grid;grid-template-columns:110px 1fr 96px;align-items:center;gap:14px}
@media(max-width:560px){.res{grid-template-columns:78px 1fr 76px;gap:9px}}
.res-name{font-weight:700;font-size:.9rem}
.bar-track{height:26px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden}
.bar{height:100%;width:0;border-radius:2px;transition:width .45s cubic-bezier(.2,.7,.2,1)}
.res-val{font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:1.12rem;text-align:right}
.res.win .res-name::before{content:"▲ ";color:var(--gold)}
.res.win .res-val{color:var(--gold)}
.res.zero{opacity:.35}
.verdict{margin-top:22px;padding:14px 18px;border-radius:3px;background:rgba(200,240,74,.07);border-left:3px solid var(--lime);font-size:.9rem}
.verdict b{color:var(--lime)}
.verdict.dead{background:rgba(232,98,61,.07);border-left-color:var(--clay)}
.verdict.dead b{color:var(--clay)}

/* BRACKET */
.bracket{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 40px;align-items:center;border:1px solid var(--line);border-radius:4px;padding:28px 24px;overflow-x:auto}
.col{display:flex;flex-direction:column;justify-content:center}
.col-qf{gap:20px}.col-sf{gap:120px}
.colhead{font-family:"Barlow Condensed",sans-serif;font-size:.72rem;letter-spacing:.2em;color:rgba(242,245,239,.4);font-weight:600;margin-bottom:16px;text-align:center}
.tie{border-left:2px solid var(--line);padding-left:14px}
.tie.upper{border-left-color:rgba(78,163,217,.45)}
.tie.lower{border-left-color:rgba(232,98,61,.45)}
.team{display:flex;align-items:center;gap:9px;font-size:.9rem;padding:5px 0;color:rgba(242,245,239,.9)}
.team .who{flex:1}
.team .od{font-family:"Barlow Condensed",sans-serif;font-size:.86rem;color:rgba(242,245,239,.35);font-weight:600}
.team .pip{width:5px;height:5px;border-radius:50%;background:var(--pc,transparent);flex:none}
.team .sc{font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:.95rem;width:14px;text-align:right;color:rgba(242,245,239,.85)}
.team.out{opacity:.4}
.team.out .who{text-decoration:line-through;text-decoration-thickness:1px}
.team.thru .who{font-weight:700}
.tie.done{border-left-color:var(--gold)}
.tie.done .when{color:rgba(242,193,78,.55)}
.ft{font-family:"Barlow Condensed",sans-serif;font-size:.66rem;letter-spacing:.16em;color:var(--gold);border:1px solid rgba(242,193,78,.4);border-radius:99px;padding:1px 7px;margin-left:8px;font-weight:700}
.when{font-family:"Barlow Condensed",sans-serif;font-size:.68rem;letter-spacing:.12em;color:rgba(242,245,239,.3);margin-top:5px}
.slot{border:1px dashed rgba(242,245,239,.18);border-radius:3px;padding:11px 14px;font-size:.85rem;color:rgba(242,245,239,.5)}
.slot .pair{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.slot .vs{margin:0 4px;color:rgba(242,245,239,.3)}
.slot.final{border:1px solid var(--gold);padding:20px 16px;text-align:center;background:rgba(242,193,78,.05)}
.slot.final .lbl{font-family:"Barlow Condensed",sans-serif;letter-spacing:.2em;font-size:.72rem;color:var(--gold);font-weight:700}
.slot.final .dt{font-size:.8rem;color:rgba(242,245,239,.5);margin-top:6px}
.slot.final .venue{font-size:.75rem;color:rgba(242,245,239,.3)}
@media(max-width:820px){.bracket{grid-template-columns:1fr;gap:28px}.col-sf{gap:20px}}

/* PLAYERS */
.players{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}
.pcard{border:1px solid var(--line);border-radius:4px;padding:20px;border-top:3px solid var(--pc)}
.pname{font-weight:900;font-size:1.15rem;letter-spacing:.02em;margin-bottom:14px}
.bet{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:.85rem;padding:8px 0;border-bottom:1px dashed rgba(242,245,239,.1)}
.bet:last-child{border-bottom:none;padding-bottom:0}
.bet .lft{display:flex;align-items:center;gap:8px;color:rgba(242,245,239,.85)}
.bet .amt{font-family:"Barlow Condensed",sans-serif;font-weight:600;color:rgba(242,245,239,.5);white-space:nowrap}

/* TABLE / ODDS */
table{width:100%;border-collapse:collapse;font-size:.85rem}
th,td{padding:9px 10px;text-align:left;border-bottom:1px solid rgba(242,245,239,.07)}
th{font-size:.7rem;letter-spacing:.14em;color:rgba(242,245,239,.45);font-weight:700;border-bottom:1px solid var(--line)}
td.cond{color:rgba(242,245,239,.8)}
td.who2{font-weight:700}
.w-sogawa{color:var(--c-so)}.w-oshieru{color:var(--c-os)}
.w-suyama{color:var(--c-su)}.w-nagaocchi{color:var(--c-na)}
.num{text-align:right;font-family:"Barlow Condensed",sans-serif;font-weight:700}
.odds-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px}
@media(max-width:760px){.odds-grid{grid-template-columns:1fr}}
.odds-card{border:1px solid var(--line);border-radius:4px;overflow:hidden}
.odds-head{background:rgba(255,255,255,.03);padding:12px 18px;font-size:.85rem;font-weight:700;letter-spacing:.06em;border-bottom:1px solid var(--line)}
.odds-row{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;border-bottom:1px solid rgba(242,245,239,.05);font-size:.92rem}
.odds-row:last-child{border-bottom:none}
.odds-row .lft{display:flex;align-items:center;gap:9px}
.odds-row.hot{background:rgba(200,240,74,.05)}
.odds-val{font-family:"Barlow Condensed",sans-serif;font-size:1.28rem;font-weight:700}
.odds-row.hot .odds-val{color:var(--lime)}
footer{margin-top:40px;font-size:.76rem;color:rgba(242,245,239,.28);border-top:1px solid var(--line);padding-top:18px}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="eyebrow">Virtual Book</div>
  <h1>2026 <em>World Cup</em></h1>
</header>

<section>
  <h2>結果シミュレーター <span class="tag">TAP TO SIMULATE</span></h2>
  <div class="sim">
    <div class="simrow">
      <div><label>QF1 勝者</label><div class="chips" data-qf="0"></div></div>
      <div><label>QF2 勝者</label><div class="chips" data-qf="1"></div></div>
      <div><label>QF3 勝者</label><div class="chips" data-qf="2"></div></div>
      <div><label>QF4 勝者</label><div class="chips" data-qf="3"></div></div>
    </div>
    <div class="simrow" style="grid-template-columns:1fr 1fr">
      <div><label>SF1 勝者</label><div class="chips" id="sf0"></div></div>
      <div><label>SF2 勝者</label><div class="chips" id="sf1"></div></div>
    </div>
    <div><label>優勝</label><div class="chips" id="champ"></div></div>
    <div class="divider"></div>
    <div class="results" id="results"></div>
    <div class="verdict" id="verdict"></div>
  </div>
</section>

<section>
  <h2>トーナメント表 <span class="tag">LAST 8</span></h2>
  <div class="bracket">
    <div class="col col-qf">
      <div class="colhead">準々決勝</div>
      <div class="tie upper" data-tie="0"></div>
      <div class="tie upper" data-tie="1"></div>
      <div class="tie lower" data-tie="2"></div>
      <div class="tie lower" data-tie="3"></div>
    </div>
    <div class="col col-sf">
      <div class="colhead">準決勝</div>
      <div class="slot" id="sfslot0"></div>
      <div class="slot" id="sfslot1"></div>
    </div>
    <div class="col col-f">
      <div class="colhead">決勝</div>
      <div class="slot final">
        <div class="lbl">FINAL</div>
        <div class="dt">7/20(月) 4:00</div>
        <div class="venue">MetLife Stadium, New Jersey</div>
      </div>
    </div>
  </div>
</section>

<section>
  <h2>4人の賭け方 <span class="tag">POSITIONS</span></h2>
  <div class="players" id="players"></div>
</section>

<section>
  <h2>勝敗の条件 <span class="tag">WHO WINS WHEN</span></h2>
  <table>
    <thead><tr><th>条件</th><th>勝者</th><th class="num">最終額</th></tr></thead>
    <tbody id="matrix"></tbody>
  </table>
</section>

<section>
  <h2>オッズ表 <span class="tag">BOOKMAKER</span></h2>
  <div class="odds-grid">
    <div class="odds-card"><div class="odds-head">優勝</div><div id="oddsWin"></div></div>
    <div class="odds-card"><div class="odds-head">決勝進出</div><div id="oddsFinal"></div></div>
  </div>
  <footer>試合開始時刻はすべて日本時間。2026年7月10日時点。</footer>
</section>

</div>

<script>
const T={FRA:"フランス",ESP:"スペイン",ARG:"アルゼンチン",ENG:"イングランド",NOR:"ノルウェー",MAR:"モロッコ",BEL:"ベルギー",SUI:"スイス"};
// inline SVG flags (viewBox 0 0 30 20)
const F={
 FRA:`<rect width="10" height="20" fill="#002395"/><rect x="10" width="10" height="20" fill="#fff"/><rect x="20" width="10" height="20" fill="#ED2939"/>`,
 MAR:`<rect width="30" height="20" fill="#c1272d"/><path d="M15 6.2l1.35 4.15h4.36l-3.53 2.56 1.35 4.15L15 14.5l-3.53 2.56 1.35-4.15-3.53-2.56h4.36z" fill="none" stroke="#006233" stroke-width="1"/>`,
 ESP:`<rect width="30" height="20" fill="#AA151B"/><rect y="5" width="30" height="10" fill="#F1BF00"/>`,
 BEL:`<rect width="10" height="20" fill="#000"/><rect x="10" width="10" height="20" fill="#FAE042"/><rect x="20" width="10" height="20" fill="#ED2939"/>`,
 NOR:`<rect width="30" height="20" fill="#BA0C2F"/><path d="M0 8h10V0h4v8h16v4H14v8h-4v-8H0z" fill="#fff"/><path d="M0 9h11V0h2v9h17v2H13v9h-2v-9H0z" fill="#00205B"/>`,
 ENG:`<rect width="30" height="20" fill="#fff"/><rect x="12.5" width="5" height="20" fill="#CE1124"/><rect y="7.5" width="30" height="5" fill="#CE1124"/>`,
 ARG:`<rect width="30" height="20" fill="#74ACDF"/><rect y="6.67" width="30" height="6.66" fill="#fff"/><circle cx="15" cy="10" r="2.1" fill="#F6B40E" stroke="#85340A" stroke-width=".3"/>`,
 SUI:`<rect width="30" height="20" fill="#D52B1E"/><rect x="13" y="4" width="4" height="12" fill="#fff"/><rect x="9" y="8" width="12" height="4" fill="#fff"/>`,
};
const flag=(k,cls="")=>`<svg class="flag ${cls}" viewBox="0 0 30 20" role="img" aria-label="${T[k]}">${F[k]}</svg>`;

const winOdds={FRA:2.87,ESP:5.00,ARG:5.00,ENG:5.50,NOR:15.00,MAR:29.00,BEL:34.00,SUI:34.00};
const finOdds={FRA:1.91,ARG:2.25,ENG:2.50,ESP:2.62,NOR:6.00,BEL:10.00,MAR:11.00,SUI:11.00};
const QF=[["FRA","MAR"],["ESP","BEL"],["NOR","ENG"],["ARG","SUI"]];
const QFINFO=["7/10(金) 5:00 ボストン","7/11(土) 4:00 ロサンゼルス","7/12(日) 6:00 マイアミ","7/12(日) 10:00 カンザスシティ"];
// 確定した結果: [勝者, スコア{チーム:得点}]
const RESULT={0:{win:"FRA",score:{FRA:2,MAR:0}}};
const PIP={FRA:"var(--c-na)",ESP:"var(--c-os)",NOR:"var(--c-so)",ENG:"var(--c-su)",ARG:"var(--c-na)"};

const P=[
 {id:"sogawa",name:"そがわ",color:"var(--c-so)",bets:[["final","NOR",10000]]},
 {id:"oshieru",name:"おしえる",color:"var(--c-os)",bets:[["win","ESP",5000],["final","NOR",5000]]},
 {id:"suyama",name:"すやま",color:"var(--c-su)",bets:[["win","ESP",5000],["final","ENG",5000]]},
 {id:"nagaocchi",name:"ながおっち",color:"var(--c-na)",bets:[["win","FRA",5000],["final","ENG",3000],["final","ARG",2000]]},
];
const odd=(t,tm)=>t==="win"?winOdds[tm]:finOdds[tm];
const yen=n=>Math.round(n).toLocaleString("ja-JP")+"円";
const payout=(p,fin,champ)=>p.bets.reduce((s,[t,tm,st])=>
  s+((t==="final"&&fin.includes(tm))||(t==="win"&&tm===champ)?st*odd(t,tm):0),0);

// bracket
document.querySelectorAll("[data-tie]").forEach(el=>{
  const i=+el.dataset.tie, r=RESULT[i];
  if(r) el.classList.add("done");
  el.innerHTML=QF[i].map(k=>{
    const pip=PIP[k]?`<span class="pip" style="--pc:${PIP[k]}"></span>`:`<span class="pip"></span>`;
    const cls=r?(r.win===k?" thru":" out"):"";
    const right=r?`<span class="sc">${r.score[k]}</span>`
                 :`<span class="od">${winOdds[k].toFixed(2)}</span>`;
    return `<div class="team${cls}">${pip}${flag(k)}<span class="who">${T[k]}</span>${right}</div>`;
  }).join("")+`<div class="when">${QFINFO[i]}${r?'<span class="ft">FT</span>':""}</div>`;
});
const side=i=>RESULT[i]?`${flag(RESULT[i].win,"sm")}<b style="color:var(--chalk);font-weight:700">${T[RESULT[i].win]}</b>`
                       :`${flag(QF[i][0],"sm")}${flag(QF[i][1],"sm")}`;
const pair=(i,j)=>`<div class="pair">${side(i)}<span class="vs">vs</span>${side(j)}</div>`;
sfslot0.innerHTML=pair(0,1)+`<div class="when">7/15(水) 4:00 ダラス</div>`;
sfslot1.innerHTML=pair(2,3)+`<div class="when">7/16(木) 4:00 アトランタ</div>`;

// players
players.innerHTML=P.map(p=>`
 <div class="pcard" style="--pc:${p.color}">
   <div class="pname">${p.name}</div>
   ${p.bets.map(([t,tm,st])=>
     `<div class="bet"><span class="lft">${flag(tm)}${T[tm]}${t==="win"?"優勝":"決勝進出"}</span><span class="amt">${st.toLocaleString()} × ${odd(t,tm).toFixed(2)}</span></div>`).join("")}
 </div>`).join("");

// odds
const hotW=["FRA","ESP"],hotF=["FRA","NOR","ENG"];
const oddsRows=(o,hot)=>Object.entries(o).sort((a,b)=>a[1]-b[1]).map(([k,v])=>
 `<div class="odds-row${hot.includes(k)?" hot":""}"><span class="lft">${flag(k)}${T[k]}</span><span class="odds-val">${v.toFixed(2)}</span></div>`).join("");
oddsWin.innerHTML=oddsRows(winOdds,hotW);
oddsFinal.innerHTML=oddsRows(finOdds,hotF);

// simulator
let qw=["FRA","ESP","ENG","ARG"],sf=["ESP","ENG"],champ="ESP";
Object.entries(RESULT).forEach(([i,r])=>{qw[+i]=r.win;});
const chip=(k,on,attr,lock)=>`<button class="chip${lock?" locked":""}" aria-pressed="${on}" ${attr} ${lock?"disabled":""}>${flag(k,"sm")}${T[k]}${lock&&on?'<span class="lock">FT</span>':""}</button>`;
function draw(){
  if(!qw.slice(0,2).includes(sf[0])) sf[0]=qw[0];
  if(!qw.slice(2,4).includes(sf[1])) sf[1]=qw[2];
  if(!sf.includes(champ)) champ=sf[0];

  document.querySelectorAll("[data-qf]").forEach(el=>{
    const i=+el.dataset.qf;
    el.innerHTML=QF[i].map(k=>chip(k,qw[i]===k,`data-q="${i}" data-t="${k}"`,!!RESULT[i])).join("");
  });
  sf0.innerHTML=qw.slice(0,2).map(k=>chip(k,sf[0]===k,`data-s="0" data-t="${k}"`)).join("");
  sf1.innerHTML=qw.slice(2,4).map(k=>chip(k,sf[1]===k,`data-s="1" data-t="${k}"`)).join("");
  document.getElementById("champ").innerHTML=sf.map(k=>chip(k,champ===k,`data-c="${k}"`)).join("");

  const rows=P.map(p=>({...p,v:payout(p,sf,champ)}));
  const max=Math.max(...rows.map(r=>r.v));
  results.innerHTML=rows.map(r=>`
   <div class="res ${r.v===max&&max>0?"win":""} ${r.v===0?"zero":""}">
     <div class="res-name">${r.name}</div>
     <div class="bar-track"><div class="bar" style="background:${r.color};width:${max?r.v/max*100:0}%"></div></div>
     <div class="res-val">${Math.round(r.v).toLocaleString()}</div>
   </div>`).join("");

  const w=rows.filter(r=>r.v===max&&max>0);
  const t=`決勝は ${T[sf[0]]} 対 ${T[sf[1]]}、優勝は${T[champ]}。`;
  verdict.className="verdict"+(max===0?" dead":"");
  verdict.innerHTML= max===0 ? `${t} 誰の賭けにも掛からず、<b>全員0円で引き分け</b>。`
    : w.length>1 ? `${t} <b>${w.map(x=>x.name).join(" と ")}</b> が ${yen(max)} で同点1位。`
    : `${t} <b>${w[0].name}さんの勝ち</b>（${yen(max)}）。`;
}
document.querySelector(".sim").addEventListener("click",e=>{
  const b=e.target.closest(".chip"); if(!b)return;
  const d=b.dataset;
  if(d.q!==undefined){ if(RESULT[+d.q])return; qw[+d.q]=d.t; }
  else if(d.s!==undefined) sf[+d.s]=d.t;
  else if(d.c) champ=d.c;
  draw();
});
draw();

const M=[
 ["ノルウェーが決勝進出（優勝国は不問）","そがわ","sogawa","60,000"],
 ["スペイン 対 イングランドの決勝 → スペイン優勝","すやま","suyama","37,500"],
 ["スペイン優勝、決勝の相手がアルゼンチンかスイス","おしえる と すやま","oshieru","25,000 で同点"],
