<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古文動詞活用クイズ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Mincho ProN','Yu Mincho','MS Mincho',Georgia,serif;background:#f5f3ef;color:#1a1a1a;min-height:100vh;padding:1.5rem 1rem}
.container{max-width:640px;margin:0 auto}
.app-title{text-align:center;margin-bottom:1.5rem}
.app-title h1{font-size:20px;font-weight:500;color:#1a1a1a;letter-spacing:.1em}
.app-title p{font-size:13px;color:#666;margin-top:4px}
.screen{display:none}
.screen.active{display:block}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.hd-title{font-size:16px;font-weight:500;color:#1a1a1a}
.hd-sub{font-size:13px;color:#666}
.prog-outer{height:4px;background:#ddd;border-radius:2px;margin-bottom:1.25rem;overflow:hidden}
.prog-inner{height:100%;background:#1F4E79;border-radius:2px;transition:width .3s}
.q-card{background:#fff;border:1px solid #e0ddd7;border-radius:10px;padding:1.25rem;margin-bottom:.75rem}
.q-label{font-size:11px;color:#999;letter-spacing:.08em;margin-bottom:8px}
.q-text{font-size:15px;color:#1a1a1a;line-height:2;margin-bottom:1.25rem}
.q-text .verb{color:#C00000;font-weight:500}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{width:100%;text-align:left;font-size:14px;padding:10px 14px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;cursor:pointer;transition:background .12s,border-color .12s;line-height:1.5;font-family:inherit}
.choice:hover:not(:disabled){background:#f0ede8;border-color:#aaa}
.choice.correct{background:#e8f5e9;border-color:#4caf50;color:#1b5e20}
.choice.wrong{background:#ffebee;border-color:#ef9a9a;color:#b71c1c}
.choice.reveal{background:#e8f5e9;border-color:#81c784;color:#2e7d32;opacity:.75}
.choice:disabled{cursor:default}
.fb{margin-top:1rem;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.8}
.fb.ok{background:#e8f5e9;border:1px solid #81c784;color:#1b5e20}
.fb.ng{background:#ffebee;border:1px solid #ef9a9a;color:#b71c1c}
.ans-gyou{color:#C00000;font-weight:500}
.ans-type{color:#1F4E79;font-weight:500}
.ans-sep{color:#666}
.ans-kei{color:#375623;font-weight:500}
.ans-suf{color:#666}
.note-box{margin-top:8px;font-size:12px;color:#555;padding:8px 12px;border-left:3px solid #B8CCE4;background:#fff;border-radius:0 6px 6px 0;line-height:1.7}
.next-btn{width:100%;margin-top:12px;padding:10px;font-size:14px;border-radius:8px;border:1px solid #bbb;background:#fff;color:#1a1a1a;cursor:pointer;font-weight:500;font-family:inherit;transition:background .12s}
.next-btn:hover{background:#f0ede8}
.result-card{background:#fff;border:1px solid #e0ddd7;border-radius:10px;padding:1.5rem;text-align:center;margin-bottom:1rem}
.score-big{font-size:52px;font-weight:400;color:#1a1a1a;line-height:1}
.score-denom{font-size:18px;color:#666;margin-top:4px}
.score-pct{font-size:14px;color:#666;margin-top:6px}
.score-msg{font-size:15px;font-weight:500;margin-top:12px;color:#1a1a1a}
.miss-section{margin-top:1rem}
.miss-title{font-size:13px;font-weight:500;color:#666;margin-bottom:8px;border-bottom:1px solid #e0ddd7;padding-bottom:6px}
.miss-item{font-size:13px;padding:10px 12px;border-radius:8px;border:1px solid #e0ddd7;background:#f9f8f5;margin-bottom:6px;line-height:1.8}
.miss-q{color:#555}
.miss-a{margin-top:4px}
.btn-row{display:flex;gap:10px;margin-top:1rem}
.btn-row button{flex:1;padding:11px;font-size:14px;border-radius:8px;border:1px solid #bbb;background:#fff;color:#1a1a1a;cursor:pointer;font-weight:500;font-family:inherit;transition:background .12s}
.btn-row button:hover{background:#f0ede8}
.btn-row button.primary{background:#1F4E79;color:#fff;border-color:#1F4E79}
.btn-row button.primary:hover{background:#185396}
.total-bar{display:flex;gap:10px;margin:1rem 0;flex-wrap:wrap}
.stat{background:#f5f3ef;border:1px solid #e0ddd7;border-radius:8px;padding:10px 14px;text-align:center;flex:1;min-width:70px}
.stat-n{font-size:22px;font-weight:500;color:#1a1a1a}
.stat-l{font-size:11px;color:#888;margin-top:3px}
.end-note{font-size:12px;color:#999;text-align:center;margin-top:1rem}
</style>
</head>

const GYOU_LIST = ["ア行","カ行","ガ行","サ行","タ行","ダ行","ナ行","ハ行","バ行","マ行","ヤ行","ラ行","ワ行"];
const TYPE_LIST = ["四段","上一段","上二段","下一段","下二段","変格"];
const KEI_LIST  = ["未然","連用","終止","連体","已然","命令"];

const BATCH = 5;
let pool = [];
let queue = [];
let qIdx = 0;
let score = 0;
let answered = false;
let missLog = [];
let totalCorrect = 0;
let totalAnswered = 0;
let roundNum = 0;

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function ansStr(a) {
  return `<span class="ans-gyou">${a[0]}</span><span class="ans-type">${a[1]}</span><span class="ans-sep">活用・</span><span class="ans-kei">${a[2]}</span><span class="ans-suf">形</span>`;
}

const VALID_KATSUYOU = (function() {
  const gyouByType = {
    "四段":  ["ア行","カ行","ガ行","サ行","タ行","ダ行","ナ行","ハ行","バ行","マ行","ヤ行","ラ行","ワ行"],
    "上一段":["カ行","ガ行","タ行","ナ行","ハ行","バ行","マ行","ヤ行","ラ行","ワ行"],
    "上二段":["カ行","ガ行","タ行","ダ行","ナ行","ハ行","バ行","マ行","ヤ行","ラ行"],
    "下一段":["カ行"],
    "下二段":["ア行","カ行","ガ行","サ行","タ行","ダ行","ナ行","ハ行","バ行","マ行","ラ行"],
    "変格":  ["カ行","サ行","ナ行","ラ行"],
  };
  const keiList = ["未然","連用","終止","連体","已然","命令"];
  const all = [];
  for (const [type, gyous] of Object.entries(gyouByType)) {
    for (const g of gyous) {
      for (const k of keiList) {
        all.push([g, type, k]);
      }
    }
  }
  return all;
})();

const VALID_SET = new Set(VALID_KATSUYOU.map(e => e.join("|")));

function makeChoices(correct) {
  const [cG, cT, cK] = correct;
  const correctKey = correct.join("|");
  const isYagyou = cG === "ヤ行";
  const used = new Set([correctKey]);
  const result = [];

  const diff1 = VALID_KATSUYOU.filter(([g, t, k]) => {
    if ([g, t, k].join("|") === correctKey) return false;
    const d = (g !== cG ? 1 : 0) + (t !== cT ? 1 : 0) + (k !== cK ? 1 : 0);
    return d === 1;
  });

  if (isYagyou) {
    const agyouDiff1 = shuffle(diff1.filter(([g]) => g === "ア行"));
    if (agyouDiff1.length > 0) {
      result.push(agyouDiff1[0]);
      used.add(agyouDiff1[0].join("|"));
    } else {
      const agyouAny = shuffle(VALID_KATSUYOU.filter(([g, t, k]) => {
        if ([g,t,k].join("|") === correctKey) return false;
        return g === "ア行";
      }));
      if (agyouAny.length > 0) {
        result.push(agyouAny[0]);
        used.add(agyouAny[0].join("|"));
      }
    }
  }

  const remaining = shuffle(diff1.filter(c => !used.has(c.join("|"))));
  for (const c of remaining) {
    if (result.length >= 3) break;
    result.push(c);
    used.add(c.join("|"));
  }

  if (result.length < 3) {
    const fallback = shuffle(VALID_KATSUYOU.filter(c => !used.has(c.join("|"))));
    for (const c of fallback) {
      if (result.length >= 3) break;
      result.push(c);
      used.add(c.join("|"));
    }
  }

  return shuffle([[...correct], ...result.slice(0, 3)]);
}

function startBatch() {
  roundNum++;
  if (pool.length < BATCH) pool = shuffle(DATA);
  queue = pool.splice(0, BATCH);
  qIdx = 0;
  score = 0;
  missLog = [];
  answered = false;
  document.getElementById('screen-result').classList.remove('active');
  document.getElementById('screen-quiz').classList.add('active');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const d = queue[qIdx];
  const choices = makeChoices(d.a);
  const pct = Math.round(qIdx / BATCH * 100);

  let html = `
    <div class="hd">
      <div>
        <div class="hd-title">動詞活用クイズ</div>
        <div class="hd-sub">第${roundNum}セット</div>
      </div>
      <div style="font-size:13px;color:#666">${qIdx + 1} / ${BATCH}</div>
    </div>
    <div class="prog-outer"><div class="prog-inner" style="width:${pct}%"></div></div>
    <div class="q-card">
      <div class="q-label">問 ${qIdx + 1} — 【】内の動詞の活用を答えよ</div>
      <div class="q-text">${d.t.replace(/【(.+?)】/, '<span class="verb">【$1】</span>')}</div>
      <div class="choices" id="choices">`;

  choices.forEach((c, i) => {
    html += `<button class="choice" data-i="${i}" data-g="${c[0]}" data-t="${c[1]}" data-k="${c[2]}">${c[0]}${c[1]}活用・${c[2]}形</button>`;
  });

  html += `</div><div id="fb"></div></div>`;
  document.getElementById('screen-quiz').innerHTML = html;

  document.querySelectorAll('.choice').forEach(btn => {
    btn.addEventListener('click', () => {
      if (answered) return;
      answered = true;
      const g = btn.dataset.g, t = btn.dataset.t, k = btn.dataset.k;
      const ok = g === d.a[0] && t === d.a[1] && k === d.a[2];

      document.querySelectorAll('.choice').forEach(b => {
        b.disabled = true;
        if (b.dataset.g === d.a[0] && b.dataset.t === d.a[1] && b.dataset.k === d.a[2]) {
          if (!ok) b.classList.add('reveal');
        }
      });

      if (ok) { btn.classList.add('correct'); score++; totalCorrect++; }
      else { btn.classList.add('wrong'); missLog.push(d); }
      totalAnswered++;

      let fb = `<div class="fb ${ok ? 'ok' : 'ng'}">`;
      fb += ok
        ? `<strong>正解！</strong>&ensp;${ansStr(d.a)}`
        : `<strong>不正解</strong>&ensp;正解：${ansStr(d.a)}`;
      if (d.note) fb += `<div class="note-box">${d.note}</div>`;
      fb += `</div>`;
      fb += `<button class="next-btn" id="next-btn">${qIdx + 1 < BATCH ? '次の問題へ' : '結果を見る'}</button>`;
      document.getElementById('fb').innerHTML = fb;

      document.getElementById('next-btn').addEventListener('click', () => {
        qIdx++;
        if (qIdx < BATCH) renderQuestion();
        else renderResult();
      });
    });
  });
}

function renderResult() {
  const pct = Math.round(score / BATCH * 100);
  const msg = pct === 100 ? 'わーい！' : pct >= 80 ? 'あっすー' : pct >= 60 ? 'あす' : '論外っすー';

  let html = `
    <div class="hd">
      <div class="hd-title">第${roundNum}セット　結果</div>
      <div class="hd-sub">累計 ${totalCorrect} / ${totalAnswered} 問正解</div>
    </div>
    <div class="result-card">
      <div class="score-big">${score}</div>
      <div class="score-denom">/ ${BATCH} 問</div>
      <div class="score-pct">${pct}%</div>
      <div class="score-msg">${msg}</div>
    </div>`;

  if (missLog.length > 0) {
    html += `<div class="miss-section"><div class="miss-title">間違えた問題（${missLog.length}問）</div>`;
    missLog.forEach(d => {
      html += `<div class="miss-item">
        <div class="miss-q">${d.t.replace(/【(.+?)】/, '【$1】')}</div>
        <div class="miss-a">${ansStr(d.a)}</div>
        ${d.note ? `<div class="note-box">${d.note}</div>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="btn-row">
    <button onclick="endQuiz()">終わる</button>
    <button class="primary" onclick="startBatch()">もう1回やる</button>
  </div>`;

  document.getElementById('screen-quiz').classList.remove('active');
  document.getElementById('screen-result').innerHTML = html;
  document.getElementById('screen-result').classList.add('active');
}

function endQuiz() {
  const pct = totalAnswered > 0 ? Math.round(totalCorrect / totalAnswered * 100) : 0;
  let html = `
    <div class="hd">
      <div class="hd-title">お疲れさまでした</div>
    </div>
    <div class="result-card">
      <div style="font-size:13px;color:#888;margin-bottom:12px">累計成績</div>
      <div class="total-bar">
        <div class="stat"><div class="stat-n">${totalAnswered}</div><div class="stat-l">出題数</div></div>
        <div class="stat"><div class="stat-n">${totalCorrect}</div><div class="stat-l">正解数</div></div>
        <div class="stat"><div class="stat-n">${pct}%</div><div class="stat-l">正答率</div></div>
        <div class="stat"><div class="stat-n">${roundNum}</div><div class="stat-l">セット数</div></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="primary" onclick="resetAll()">最初からやり直す</button>
    </div>
    <p class="end-note">竹取物語・今昔物語集（道成寺説話）　全146問</p>`;
  document.getElementById('screen-result').innerHTML = html;
}

function resetAll() {
  pool = [];
  totalCorrect = 0;
  totalAnswered = 0;
  roundNum = 0;
  startBatch();
}

startBatch();
